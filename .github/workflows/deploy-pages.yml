name: Deploy HTFC to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# 提前啟用 Node.js 24 以解決棄用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          # 安裝 Ubuntu 系統層級的圖形介面與 OpenGL 依賴庫，解決 libEGL 缺失問題
          sudo apt-get update
          sudo apt-get install -y libegl1 libgles2 libxkbcommon0 libdbus-1-3 libxcb-cursor0
          
          # 安裝物理運算與渲染所需的 Python 套件
          pip install numpy scipy plotly PyQt6 PyQt6-WebEngine 

      - name: Generate 3D HTML levels
        run: |
          mkdir -p public/levels
          
          cat << 'EOF' > build_web.py
          import os
          import sys
          # 確保 Python 能正確讀取當前目錄下的 HTFC_Engine
          sys.path.append(os.getcwd()) 
          try:
              from HTFC_Engine import HolographicFluidCosmologyEngine
              
              engine = HolographicFluidCosmologyEngine()
              os.makedirs("public/levels", exist_ok=True)

              # 匯出論文核心階層 16 (CMB) 與 17 (全尺度橋接)
              for i in [15, 16]:
                  html_data = engine.get_render_html(i)
                  with open(f"public/levels/level_{i+1}.html", "w", encoding="utf-8") as f:
                      f.write(html_data)
              print("3D 渲染成功完成")
          except Exception as e:
              print(f"渲染發生關鍵錯誤: {e}")
              sys.exit(1)
          EOF
          
          # 強制 PyQt6 在無實體螢幕的雲端伺服器上進行背景渲染
          export QT_QPA_PLATFORM=offscreen
          python build_web.py

      - name: Generate index.html
        run: |
          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="zh-TW">
          <head>
              <meta charset="UTF-8">
              <title>HTFC 宇宙流體觀測站 - Chung-Lin Lee</title>
              <style>
                  body { background-color: #02040A; color: #00FFFF; font-family: sans-serif; text-align: center; padding: 50px; }
                  .menu { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 30px; }
                  a { border: 1px solid #00FFFF; padding: 15px; color: #00FFFF; text-decoration: none; width: 300px; border-radius: 5px; transition: 0.3s; }
                  a:hover { background-color: #0066CC; color: white; }
              </style>
          </head>
          <body>
              <h1>全像拓撲流體宇宙學 (HTFC)</h1>
              <p>互動式 3D 流體模型在線觀測站 | 作者：Chung-Lin Lee (李宗霖)</p>
              <div class="menu">
                  <a href="levels/level_16.html">第 16 階：CMB 全像網絡</a>
                  <a href="levels/level_17.html">第 17 階：全尺度無縫橋接</a>
                  <a href="https://github.com/${{ github.repository }}/blob/main/Holographic_Topological_Fluid_Cosmology_Paper.md" target="_blank">閱讀論文原文</a>
              </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
